

services:
  mariadb:
    image: mariadb:10.11
    container_name: signage-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: digital_signage
      MYSQL_USER: signage_user
      MYSQL_PASSWORD: signage_password
    ports:
      - '3306:3306'
    volumes:
      - mariadb_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: signage-phpmyadmin
    restart: always
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
    ports:
      - '8080:80'
    depends_on:
      - mariadb

volumes:
  mariadb_data:
