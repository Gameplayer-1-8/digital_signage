version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: signage-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: digital_signage
      MYSQL_USER: signage_user
      MYSQL_PASSWORD: signage_password
    ports:
      - '3306:3306'
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
