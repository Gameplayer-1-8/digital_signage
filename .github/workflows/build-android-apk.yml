name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: android-client/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Resolve app version
        id: app_version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Generate Android project
        run: CI=1 npx expo prebuild --platform android

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease

      - name: Rename APK with version
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
            android/app/build/outputs/apk/release/digital-signage-${{ steps.app_version.outputs.value }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk-${{ steps.app_version.outputs.value }}
          path: android-client/android/app/build/outputs/apk/release/digital-signage-${{ steps.app_version.outputs.value }}.apk

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Android Client ${{ github.ref_name }}
          files: android-client/android/app/build/outputs/apk/release/digital-signage-${{ steps.app_version.outputs.value }}.apk
